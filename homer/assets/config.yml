# Services
# First level array represent a group.
# Leave only a "items" key if not using group (group name, icon & tagstyle are optional, section separation will not be displayed).
services:
  - name: "Websites"
    icon: "fas fa-globe"
    items:
      - name: "Bouni's blog"
        logo: "assets/tools/blog.png"
        tag: "website"
        url: "https://blog.bouni.de"
        target: "_blank" # optional html a tag target attribute

  - name: "Applications"
    icon: "fas fa-cloud"
    items:
      - name: "Shiori"
        logo: "assets/tools/shiori.png"
        subtitle: "bookmark management"
        tag: "app"
        url: "https://shiori.bouni.de"
        target: "_blank" # optional html a tag target attribute
      - name: "Home Assistant"
        logo: "assets/tools/home-assistant.svg"
        subtitle: "Awaken your home"
        tag: "app"
        url: "https://ha.bouni.de"
        target: "_blank" # optional html a tag target attribute
      - name: "Grafana"
        logo: "assets/tools/grafana.png"
        tag: "app"
        url: "https://grafana.bouni.de"
        target: "_blank" # optional html a tag target attribute
      - name: "Vaultwarden"
        logo: "assets/tools/bitwarden.png"
        subtile: "Bitwarden server"
        tag: "app"
        url: "https://bitwarden.bouni.de"
        target: "_blank" # optional html a tag target attribute

  - name: "Network"
    icon: "fas fa-network-wired"
    items:
      - name: "Pi-hole"
        logo: "assets/tools/pihole.png"
        subtitle: "Network-wide Ad Blocking"
        tag: "network"
        url: "https://pihole.bouni.de"
        target: "_blank" # optional html a tag target attribute
      - name: "Wg Gen Web"
        logo: "assets/tools/wg-gen-web.png"
        subtitle: "wireguard config"
        tag: "network"
        url: "https://vpn.bouni.de"
        target: "_blank" # optional html a tag target attribute
      - name: "Uptime kuma"
        logo: "assets/tools/uptime-kuma.png"
        subtitle: "website monitoring"
        tag: "network"
        url: "https://uptime.bouni.de"
        target: "_blank" # optional html a tag target attribute
